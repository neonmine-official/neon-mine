<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonMine - Cloud Mining</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #0b071e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* 💰 ბალანსის განყოფილება */
        .header {
            text-align: center;
            width: 100%;
        }

        .header h1 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8b5cf6;
            margin-bottom: 8px;
        }

        .balance-container {
            font-size: 50px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(139, 92, 246, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .currency {
            color: #a78bfa;
            font-size: 32px;
        }

        /* 🚀 ნეონის მაინერის ანიმაცია */
        .mining-section {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            height: 280px;
        }

        .neon-circle {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top: 4px solid #8b5cf6;
            border-right: 4px solid #ec4899;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.4);
        }

        .neon-circle.active {
            animation: rotateCircle 1.5s linear infinite;
        }

        .inner-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, #1e1145 0%, #0f0926 100%);
            border: 2px solid #3b2082;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: inset 0 0 30px rgba(139, 92, 246, 0.5);
            transition: transform 0.1s ease;
            position: absolute;
        }

        .inner-button:active {
            transform: scale(0.95);
        }

        .status-text {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #a78bfa;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .speed-text {
            font-size: 12px;
            color: #8b5cf6;
            margin-top: 4px;
        }

        /* ანიმაცია */
        @keyframes rotateCircle {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- ზედა ბალანსი -->
        <div class="header">
            <h1>საერთო ბალანსი</h1>
            <div class="balance-container">
                <span class="currency">$</span><span id="user-balance">1.0000</span>
            </div>
        </div>

        <!-- მაინერი -->
        <div class="mining-section">
            <div class="neon-circle" id="circle-anim"></div>
            <div class="inner-button" id="mine-btn">
                <svg width="45" height="45" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="#8b5cf6" stroke="#ec4899" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
                <span class="status-text" id="btn-status">START MINE</span>
                <span class="speed-text">⚡ Cloud Power x1</span>
            </div>
        </div>
    </div>

    <script>
        let balance = 1.0000;
        let isMining = false;
        let intervalId = null;

        const balanceEl = document.getElementById('user-balance');
        const mineBtn = document.getElementById('mine-btn');
        const circleAnim = document.getElementById('circle-anim');
        const btnStatus = document.getElementById('btn-status');

        mineBtn.addEventListener('click', () => {
            if (!isMining) {
                isMining = true;
                circleAnim.classList.add('active');
                btnStatus.innerText = "MINING...";
                btnStatus.style.color = "#ec4899";

                intervalId = setInterval(() => {
                    balance += 0.0003; 
                    balanceEl.innerText = balance.toFixed(4);
                }, 100);
            } else {
                isMining = false;
                circleAnim.classList.remove('active');
                btnStatus.innerText = "START MINE";
                btnStatus.style.color = "#a78bfa";
                clearInterval(intervalId);
            }
        });
    </script>
</body>
</html>
