<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonMine Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: #060214;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 🎬 1. 5-წამიანი მისალმების ეფექტი */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #0f052d 0%, #050112 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .intro-logo {
            width: 90px;
            height: 90px;
            background: #00ff66;
            border-radius: 50%;
            box-shadow: 0 0 40px #00ff66;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .intro-text {
            margin-top: 25px;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow: 0 0 15px #8b5cf6;
            text-transform: uppercase;
        }

        .intro-loader {
            margin-top: 15px;
            width: 150px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .intro-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #00ff66);
            animation: loadProgress 4.5s linear forwards;
        }

        /* 🚪 2. „ჩემი სივრცე“ */
        #space-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .welcome-box {
            text-align: center;
            margin-bottom: 40px;
        }

        .welcome-box h2 {
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .welcome-box p {
            color: #a78bfa;
            font-size: 14px;
        }

        .enter-btn {
            background: linear-gradient(135deg, #8b5cf6 0%, #00ff66 100%);
            border: none;
            color: #060214;
            padding: 18px 45px;
            font-size: 18px;
            font-weight: 800;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.4);
            text-transform: uppercase;
        }

        /* 📱 3. მთავარი აპლიკაცია */
        #main-app {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 20px 15px 90px 15px;
        }

        .top-bar {
            text-align: center;
            width: 100%;
        }

        .top-bar h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ff66;
            margin-bottom: 5px;
        }

        .coin-balance {
            font-size: 45px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.6);
        }

        .tab-window {
            display: none;
            width: 100%;
            max-width: 360px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .tab-window.active {
            display: flex;
        }

        /* 🔮 სვეტი 2: მაინინგი */
        .wheel-container {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .neon-orb {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            border: 4px dashed #00ff66;
            position: absolute;
        }

        .neon-orb.spinning {
            animation: spin 3s linear infinite;
            border-style: solid;
            border-top-color: #8b5cf6;
            border-right-color: #00ff66;
            border-bottom-color: #8b5cf6;
            border-left-color: #00ff66;
        }

        .orb-core {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: #1a0933;
            border: 3px solid #8b5cf6;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
        }

        .orb-btn-text {
            font-size: 24px;
            font-weight: 900;
            color: #00ff66;
            text-shadow: 0 0 10px #00ff66;
        }

        .timer-text {
            font-size: 12px;
            color: #a78bfa;
            margin-top: 5px;
        }

        /* 👤 სვეტი 1: პროფილი */
        .profile-card {
            width: 100%;
            background: rgba(26, 9, 51, 0.6);
            border: 2px solid #8b5cf6;
            border-radius: 20px;
            padding: 25px;
        }

        .profile-title {
            font-size: 18px;
            font-weight: 800;
            color: #00ff66;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            font-size: 15px;
        }

        /* 📊 სვეტი 3: სტატისტიკა */
        .stats-card {
            width: 100%;
            background: rgba(26, 9, 51, 0.6);
            border: 2px solid #00ff66;
            border-radius: 20px;
            padding: 20px;
        }

        .withdrawal-list {
            margin-top: 15px;
            width: 100%;
        }

        .withdrawal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(139, 92, 246, 0.15);
            font-size: 13px;
        }

        /* 📱 ქვედა ნავიგაცია */
        .bottom-navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: #0a041c;
            border-top: 2px solid #8b5cf6;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 33.33%;
            height: 100%;
            color: #64748b;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .nav-column.active {
            color: #00ff66;
        }

        /* 📺 რეკლამა */
        #ad-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 1, 18, 0.95);
            z-index: 10000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .ad-box {
            width: 280px;
            background: #12072b;
            border: 2px solid #00ff66;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
        }

        .ad-timer {
            font-size: 35px;
            font-weight: 900;
            color: #00ff66;
            margin: 15px 0;
        }

        @keyframes loadProgress { from { width: 0%; } to { width: 100%; } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-logo">
            <span style="font-size:40px;">⚡</span>
        </div>
        <div class="intro-text">NeonMine Pro</div>
        <div class="intro-loader">
            <div class="intro-bar"></div>
        </div>
    </div>

    <div id="space-screen">
        <div class="welcome-box">
            <h2>მოგესალმებით</h2>
            <p>პლატფორმა მზად არის სამუშაოდ</p>
        </div>
        <button class="enter-btn" onclick="openAppSpace()">ჩემი სივრცე</button>
    </div>

    <div id="main-app">
        <div class="top-bar">
            <h3>მიმდინარე ბალანსი</h3>
            <div class="coin-balance">
                <span id="coin-amount">0.0000</span> <span style="color:#00ff66;">NMC</span>
            </div>
        </div>

        <div id="window-profile" class="tab-window">
            <div class="profile-card">
                <div class="profile-title">პროფილი</div>
                <div class="info-row"><span>სტატუსი:</span><span style="color:#00ff66;">VIP</span></div>
                <div class="info-row"><span>სიჩქარე:</span><span>1.0x NMC/წმ</span></div>
                <div class="info-row"><span>ლიმიტი:</span><span>2 საათი</span></div>
            </div>
        </div>

        <div id="window-wheel" class="tab-window active">
            <div class="wheel-container">
                <div class="neon-orb" id="orb-animation"></div>
                <div class="orb-core" id="start-mine-btn">
                    <span class="orb-btn-text" id="btn-label">START</span>
                    <div class="timer-text" id="mining-timer">მზად არის</div>
                </div>
            </div>
        </div>

        <div id="window-stats" class="tab-window">
            <div class="stats-card">
                <div style="font-weight:800; border-bottom:1px solid #00ff66; padding-bottom:10px;">ლაივ გატანები</div>
                <div class="withdrawal-list" id="fake-list"></div>
            </div>
        </div>

        <div class="bottom-navbar">
            <div id="nav-profile" class="nav-column" onclick="switchTab('profile')">
                <span>👤 პროფილი</span>
            </div>
            <div id="nav-wheel" class="nav-column active" onclick="switchTab('wheel')">
                <span>🔄 ბორბალი</span>
            </div>
            <div id="nav-stats" class="nav-column" onclick="switchTab('stats')">
                <span>📊 სტატისტიკა</span>
            </div>
        </div>
    </div>

    <div id="ad-modal">
        <div class="ad-box">
            <h3>სპონსორის რეკლამა</h3>
            <div class="ad-timer" id="ad-countdown">5</div>
        </div>
    </div>

    <script>
        let coins = 0.0000;
        let isMining = false;
        let remainingTime = 7200;

        setTimeout(() => {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('space-screen').style.display = 'flex';
            }, 800);
        }, 5000);

        function openAppSpace() {
            document.getElementById('space-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            generateFakeWithdrawals();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-window').forEach(w => w.classList.remove('active'));
            document.querySelectorAll('.nav-column').forEach(n => n.classList.remove('active'));
            document.getElementById('window-' + tabName).classList.add('active');
            document.getElementById('nav-' + tabName).classList.add('active');
        }

        document.getElementById('start-mine-btn').addEventListener('click', () => {
            if (isMining) return;
            
            document.getElementById('ad-modal').style.display = 'flex';
            let adTime = 5;
            let adInt = setInterval(() => {
                adTime--;
                document.getElementById('ad-countdown').innerText = adTime;
                if (adTime <= 0) {
                    clearInterval(adInt);
                    document.getElementById('ad-modal').style.display = 'none';
                    startMiningProcess();
                }
            }, 1000);
        });

        function startMiningProcess() {
            isMining = true;
            document.getElementById('orb-animation').classList.add('spinning');
            document.getElementById('btn-label').innerText = "MINING";
            remainingTime = 7200;

            let mInt = setInterval(() => {
                coins += 0.0015;
                document.getElementById('coin-amount').innerText = coins.toFixed(4);
            }, 500);

            let cInt = setInterval(() => {
                remainingTime--;
                if (remainingTime <= 0) {
                    clearInterval(mInt);
                    clearInterval(cInt);
                    isMining = false;
                    document.getElementById('orb-animation').classList.remove('spinning');
                    document.getElementById('btn-label').innerText = "START";
                    document.getElementById('mining-timer').innerText = "მზად არის";
                } else {
                    let h = Math.floor(remainingTime / 3600).toString().padStart(2, '0');
                    let m = Math.floor((remainingTime % 3600) / 60).toString().padStart(2, '0');
                    let s = (remainingTime % 60).toString().padStart(2, '0');
                    document.getElementById('mining-timer').innerText = ${h}:${m}:${s};
                }
            }, 1000);
        }

        function generateFakeWithdrawals() {
            const list = document.getElementById('fake-list');
            const users = ['@giorgi_9', '@crypto_v', '@nini_k', '@luka_m', '@beka_7'];
            list.innerHTML = '';
            for(let i=0; i<5; i++) {
                let u = users[Math.floor(Math.random() * users.length)] + Math.floor(Math.random()*90+10);
                let a = Math.floor(Math.random() * 800 + 150);
                list.innerHTML += <div class="withdrawal-item"><span style="color:#a78bfa;">${u}</span><span style="color:#00ff66;font-weight:800;">+${a} NMC</span><span>ახლახან</span></div>;
            }
        }
        setInterval(generateFakeWithdrawals, 6000);
    </script>
</body>
</html>
