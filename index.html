<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonMine - Cloud Mining</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #0b071e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 25px 15px;
            overflow: hidden;
        }

        /* ზედა პანელი - ბალანსი */
        .header {
            text-align: center;
            width: 100%;
            margin-top: 10px;
        }

        .header h1 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8b5cf6;
            margin-bottom: 5px;
        }

        .balance-container {
            font-size: 42px;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .currency {
            color: #a78bfa;
            font-size: 28px;
        }

        /* ცენტრალური ნაწილი - მბრუნავი ნეონის წრე */
        .mining-section {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            height: 300px;
        }

        .neon-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top: 4px solid #8b5cf6;
            border-right: 4px solid #ec4899;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.2);
        }

        .neon-circle.active {
            animation: rotateCircle 2s linear infinite;
        }

        .inner-button {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, #1e1145 0%, #0f0926 100%);
            border: 2px solid #3b2082;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: inset 0 0 20px rgba(139, 92, 246, 0.3);
            transition: transform 0.1s ease;
            position: absolute; /* ტექსტი რომ არ დატრიალდეს */
        }

        .inner-button:active {
            transform: scale(0.95);
        }

        .inner-button img {
            width: 50px;
            height: 50px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 8px #8b5cf6);
        }

        .status-text {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #a78bfa;
            text-transform: uppercase;
        }

        .speed-text {
            font-size: 11px;
            color: #6d28d9;
            margin-top: 4px;
        }

        /* ქვედა სექცია - სტატისტიკა და ინფორმაცია */
        .footer-stats {
            background: rgba(30, 17, 69, 0.5);
            border: 1px solid rgba(139, 92, 246, 0.2);
            width: 100%;
            max-width: 350px;
            border-radius: 16px;
            padding: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: #94a3b8;
        }

        .stat-value {
            color: #ec4899;
            font-weight: 600;
        }

        /* ანიმაცია წრის ბრუნვისთვის */
        @keyframes rotateCircle {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>შენი ბალანსი</h1>
        <div class="balance-container">
            <span class="currency">$</span><span id="user-balance">1.0000</span>
        </div>
    </div>

    <div class="mining-section">
        <div class="neon-circle" id="circle-anim"></div>
        <div class="inner-button" id="mine-btn">
            <svg width="45" height="45" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="#8b5cf6" stroke="#ec4899" stroke-width="1.5" stroke-linejoin="round"/>
            </svg>
            <span class="status-text" id="btn-status">START MINE</span>
            <span class="speed-text" id="mining-speed">⏱️ 24 საათი</span>
        </div>
    </div>

    <div class="footer-stats">
        <div class="stat-row">
            <span class="stat-label">პლატფორმა:</span>
            <span class="stat-value" style="color: #8b5cf6;">NeonMine Cloud v1.0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">ალგორითმი:</span>
            <span class="stat-value">🔥 Budzi 95/5 Model</span>
        </div>
    </div>

    <script>
        let balance = 1.0000;
        let isMining = false;
        let intervalId = null;

        const balanceEl = document.getElementById('user-balance');
        const mineBtn = document.getElementById('mine-btn');
        const circleAnim = document.getElementById('circle-anim');
        const btnStatus = document.getElementById('btn-status');

        mineBtn.addEventListener('click', () => {
            if (!isMining) {
                // მაინინგის პროცესის დაწყება
                isMining = true;
                circleAnim.classList.add('active');
                btnStatus.innerText = "MINING...";
                btnStatus.style.color = "#ec4899";

                // იწყება ციფრების მატება ეკრანზე რეალურ დროში (ვიზუალური ეფექტი)
                intervalId = setInterval(() => {
                    // მომხმარებლის 5%-იანი წილიდან სიმულაცია წამებში
                    balance += 0.0003; 
                    balanceEl.innerText = balance.toFixed(4);
                }, 100);
            } else {
                // გაჩერება
                isMining = false;
                circleAnim.classList.remove('active');
                btnStatus.innerText = "START MINE";
                btnStatus.style.color = "#a78bfa";
                clearInterval(intervalId);
            }
        });
    </script>
</body>
</html>
